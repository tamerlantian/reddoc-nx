<section class="cta">
  <div class="container-edit cta-frame">
    <!-- Decorative grid background -->
    <div class="cta-grid-bg" aria-hidden="true">
      <svg viewBox="0 0 600 280" preserveAspectRatio="xMidYMid slice">
        <defs>
          <pattern id="cta-grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path
              d="M 40 0 L 0 0 0 40"
              fill="none"
              stroke="rgba(255,255,255,0.05)"
              stroke-width="1"
            />
          </pattern>
          <radialGradient id="cta-glow" cx="50%" cy="100%" r="60%">
            <stop offset="0%" stop-color="#009ef7" stop-opacity="0.32" />
            <stop offset="100%" stop-color="#009ef7" stop-opacity="0" />
          </radialGradient>
        </defs>
        <rect width="600" height="280" fill="url(#cta-grid)" />
        <rect width="600" height="280" fill="url(#cta-glow)" />
      </svg>
    </div>

    <div class="cta-inner">
      <div class="cta-meta">
        <span class="status-pill is-live cta-pill">
          <span class="dot"></span>
          {{ t().cta.eyebrow }}
        </span>
      </div>

      <h2 class="cta-title">
        {{ t().cta.title }}
        <span class="cta-title-accent">{{ t().cta.italic }}</span>
      </h2>

      <p class="cta-lede">{{ t().cta.lede }}</p>

      <div class="cta-actions">
        <a class="btn btn-emerald" href="#pricing">
          {{ t().cta.primary }}
          <svg class="arrow" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <path
              d="M2 7h10M8 3l4 4-4 4"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </a>
        <a class="btn btn-ghost-light" href="#contact">
          {{ t().cta.secondary }}
        </a>
      </div>

      <div class="cta-statusline">
        <span><span class="dot"></span>ONLINE</span>
        <span class="cta-sep">·</span>
        <span>DIAN OK</span>
        <span class="cta-sep">·</span>
        <span>SOPORTE LUN–VIE</span>
        <span class="cta-sep">·</span>
        <span>v.2026.04</span>
      </div>
    </div>
  </div>
</section>
